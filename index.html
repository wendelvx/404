      /* Preloader básico para evitar o "flash branco" antes do React carregar */

        margin: 0;
        background-color: #09090b; /* Cor zinc-950 do Tailwind */
        color: #ffffff;
        font-family: 'Inter', sans-serif;
      }
      
      /* Garante que o scroll suave do Lenis não tenha saltos visuais na barra de rolagem */

        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      html::-webkit-scrollbar {
        display: none;
      }
